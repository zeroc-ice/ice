name: Setup Java
description: Installs Oracle Java 17 using the actions/setup-java action.
runs:
  using: "composite"
  steps:
    - name: Setup Oracle Java 17
      uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
      with:
        distribution: "oracle"
        java-version: "17"
