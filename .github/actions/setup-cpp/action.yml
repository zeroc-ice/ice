name: Setup C++
runs:
  using: "composite"
  steps:
    - name: Install dependencies on macOS
      if: runner.os == 'macOS'
      shell: bash
      run: brew install mcpp lmdb

    - name: Install dependencies on Linux
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update && sudo apt-get install -y \
            libbz2-dev libssl-dev libffi-dev \
            libmcpp-dev libedit-dev liblmdb-dev libexpat1-dev libsystemd-dev \
            libbluetooth-dev libdbus-1-dev \
            gdb

    # This is needed for GDB to work on Linux runners
    - name: Disable ptrace protection on Linux
      if: runner.os == 'Linux'
      shell: bash
      run: echo 0 | sudo tee /proc/sys/kernel/yama/ptrace_scope

    - name: Set macOS MAKEFLAGS
      run: echo "MAKEFLAGS=-j$(sysctl -n hw.ncpu) V=1" >> $GITHUB_ENV
      shell: bash
      if: runner.os == 'macOS'

    - name: Set Linux MAKEFLAGS
      run: echo "MAKEFLAGS=-j$(nproc) V=1" >> $GITHUB_ENV
      shell: bash
      if: runner.os == 'Linux'

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@30375c66a4eea26614e0d39710365f22f8b0af57 # v3.0.0
      with:
        msbuild-architecture: x64
      if: runner.os == 'Windows'

    # Ice 3.7 supports the Visual Studio 2019/2022 (v141/v142/v143) toolsets. Newer runner images (e.g. the VS2026 /
    # v145 image) would otherwise build with a platform toolset Ice 3.7 does not support, which fails. Pin to v143
    # through the environment so every Windows build uses a supported toolset. Workflows that build a specific toolset
    # (the C++ binary and NuGet package builds) pass /p:DefaultPlatformToolset=... explicitly, and that command-line
    # property overrides this environment default.
    - name: Pin MSVC platform toolset to v143
      if: runner.os == 'Windows'
      shell: pwsh
      run: Add-Content -Path $env:GITHUB_ENV -Value "DefaultPlatformToolset=v143"
