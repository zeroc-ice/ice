name: Setup Bluetooth
description: >
  Brings up a pair of virtual Bluetooth controllers so IceBT can be exercised against a real host
  Bluetooth stack. C++ IceBT drives BlueZ over D-Bus, so unlike the Java tests -- which run between
  two Android emulators -- it needs actual controllers on the runner.

  Linux only, and in practice arm64 only: Ubuntu builds the Bluetooth modules for the arm64 azure
  kernel but strips them from the amd64 one, where `modprobe bluetooth` reports "Module bluetooth
  not found" even after the module package is installed.

  Exports BT_ADDR: the address of the second controller, for the test server to bind to.

runs:
  using: "composite"
  steps:
    - name: Install the Bluetooth modules and BlueZ
      shell: bash
      run: |
        # The modules aren't in the base linux-modules package -- hci_vhci.ko and the rest live in
        # linux-modules-extra, which the runner images don't install. btvirt (the virtual controller
        # tool) is in bluez-test-tools, not bluez.
        sudo apt-get update -qq
        sudo apt-get install -y "linux-modules-extra-$(uname -r)" bluez bluez-test-tools

    - name: Load the modules
      shell: bash
      run: |
        # l2cap is deliberately absent: it is built into bluetooth.ko rather than being a module.
        for m in bluetooth rfcomm bnep hci_vhci; do
          sudo modprobe "$m"
        done
        lsmod | grep -Ei 'blue|rfcomm|bnep|vhci' || true
        test -c /dev/vhci || { echo "no /dev/vhci after modprobe"; exit 1; }

    - name: Create two virtual controllers
      shell: bash
      run: |
        # btvirt holds the controllers open for as long as it runs, so it has to outlive this step.
        sudo nohup btvirt -l2 > "$GITHUB_WORKSPACE/btvirt.log" 2>&1 &
        for i in $(seq 1 30); do
          hciconfig hci1 >/dev/null 2>&1 && break
          sleep 1
        done
        echo "## controllers"
        hciconfig -a || true
        # Both are needed: the server binds to one, the client connects from the other.
        hciconfig hci1 >/dev/null 2>&1 || {
          echo "btvirt did not create two controllers"; cat "$GITHUB_WORKSPACE/btvirt.log"; exit 1; }
        sudo hciconfig hci0 up || true
        sudo hciconfig hci1 up || true
        addr=$(hciconfig hci1 | sed -n 's/.*BD Address: \([0-9A-F:]*\).*/\1/p')
        [ -n "$addr" ] || { echo "could not read hci1's address"; exit 1; }
        echo "server controller (hci1) = $addr"
        echo "BT_ADDR=$addr" >> "$GITHUB_ENV"

    - name: Pair the two controllers
      shell: bash
      run: |
        # IceBT resolves a peer address against the devices BlueZ has discovered, not against the
        # local adapters, so the two controllers have to find and pair with each other first --
        # the same bond that secure RFCOMM needs on the Android side. Driven through bluetoothctl
        # rather than btmgmt because bluetoothd owns the mgmt socket, and because D-Bus is the
        # interface IceBT itself uses.
        set +e
        systemctl is-active bluetooth >/dev/null || sudo systemctl start bluetooth
        sleep 2
        client=$(hciconfig hci0 | sed -n 's/.*BD Address: \([0-9A-F:]*\).*/\1/p')

        # bluetoothctl is interactive by default and will sit waiting on stdin if it is given a
        # terminal, so every call either feeds it a script or reads from /dev/null. Without this a
        # single stray prompt burns the whole step timeout instead of failing.
        btctl() { sudo bluetoothctl "$@" < /dev/null; }

        echo "## controllers known to bluetoothd"
        btctl list

        echo "## make the server controller discoverable"
        printf 'select %s\npower on\ndiscoverable on\npairable on\nquit\n' "$BT_ADDR" | sudo bluetoothctl

        # Pairing needs an agent to answer the request, the same job btbond does on Android.
        # NoInputNoOutput selects "just works" pairing, so nothing waits for a PIN or a confirmation
        # that no one is there to give. Scan, pair, then trust: an unpaired, untrusted device is
        # temporary, and BlueZ drops it from the object tree once discovery stops -- which is why
        # the first attempt found the device during setup and IceBT saw nothing by test time.
        echo "## scan, pair and trust from the client controller"
        printf 'select %s\npower on\nagent NoInputNoOutput\ndefault-agent\nscan on\nquit\n' "$client" |
          sudo bluetoothctl
        btctl --timeout 20 scan on
        btctl devices
        btctl --timeout 30 pair "$BT_ADDR"
        btctl trust "$BT_ADDR"
        btctl info "$BT_ADDR"

        # Everything above is best-effort so one run reports the whole picture. Assert on Paired,
        # not on the device merely being visible: discovery alone does not survive to test time.
        btctl info "$BT_ADDR" | grep -qi "Paired: yes" || {
          echo "$client did not pair with $BT_ADDR"
          echo "-- devices --"; btctl devices
          echo "-- btvirt log --"; cat "$GITHUB_WORKSPACE/btvirt.log"
          exit 1; }
        echo "client $client paired with server $BT_ADDR"
