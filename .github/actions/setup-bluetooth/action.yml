name: Setup Bluetooth
description: >
  Builds a two-sided Bluetooth setup on one runner so the C++ IceBT transport can be tested. C++
  IceBT drives BlueZ over D-Bus and needs a real host Bluetooth stack, so unlike the Java tests --
  which run between two Android emulators -- it cannot be exercised without one.

  Two things make this work on a single machine:

  * Two BR/EDR-only virtual controllers from btvirt. LE is deliberately excluded: with LE enabled a
    second bluetoothd cannot claim the adapters, failing on the GATT L2CAP bind.
  * A second bluetoothd on a private D-Bus bus. BlueZ allows only one profile registration per UUID
    per daemon (src/profile.c: "UUID already registered"), and Ice registers the same RFCOMM UUID on
    both the client and the server side, so the two sides must talk to different daemons.

  The server-side process controller is started against the system bus; DBUS_SYSTEM_BUS_ADDRESS is
  then exported so every later step -- the test client -- uses the second daemon.

  Linux arm64 only: Ubuntu builds the Bluetooth modules for the arm64 azure kernel but strips them
  from the amd64 one, where modprobe reports "Module bluetooth not found".

  Exports BT_ADDR (the server controller's address) and DBUS_SYSTEM_BUS_ADDRESS.

inputs:
  working_directory:
    description: "Directory to start the server-side process controller from"
    default: "cpp"

runs:
  using: "composite"
  steps:
    - name: Install the Bluetooth modules and BlueZ
      shell: bash
      run: |
        # hci_vhci.ko and friends live in linux-modules-extra, which the runner images don't
        # install. btvirt is in bluez-test-tools; bt-agent is in bluez-tools.
        sudo apt-get update -qq
        sudo apt-get install -y \
          "linux-modules-extra-$(uname -r)" bluez bluez-test-tools bluez-tools

    - name: Load the modules
      shell: bash
      run: |
        # l2cap is deliberately absent: it is built into bluetooth.ko rather than being a module.
        for m in bluetooth rfcomm bnep hci_vhci; do
          sudo modprobe "$m"
        done
        test -c /dev/vhci || { echo "no /dev/vhci after modprobe"; exit 1; }

    - name: Create two BR/EDR-only controllers
      shell: bash
      run: |
        # -B is load-bearing, not a preference: dual-mode controllers leave the second bluetoothd
        # unable to register an adapter ("Failed to start listening: l2cap_bind: Address already in
        # use"), because the first daemon already holds the LE/GATT socket.
        sudo sh -c "nohup btvirt -B -l2 > '$GITHUB_WORKSPACE/btvirt.log' 2>&1 &"
        for _ in $(seq 1 30); do hciconfig hci1 >/dev/null 2>&1 && break; sleep 1; done
        hciconfig hci1 >/dev/null 2>&1 || {
          echo "btvirt did not create two controllers"; cat "$GITHUB_WORKSPACE/btvirt.log"; exit 1; }
        sudo hciconfig hci0 up
        sudo hciconfig hci1 up
        hciconfig -a | grep -E "^hci|BD Address"
        server=$(hciconfig hci1 | sed -n 's/.*BD Address: \([0-9A-F:]*\).*/\1/p')
        client=$(hciconfig hci0 | sed -n 's/.*BD Address: \([0-9A-F:]*\).*/\1/p')
        [ -n "$server" ] && [ -n "$client" ] || { echo "could not read controller addresses"; exit 1; }
        echo "BT_ADDR=$server" >> "$GITHUB_ENV"
        echo "BT_CLIENT_ADDR=$client" >> "$GITHUB_ENV"

    - name: Start a second bluetoothd on a private bus
      shell: bash
      run: |
        sudo systemctl start bluetooth
        cat > /tmp/bus2.conf <<'EOF'
        <!DOCTYPE busconfig PUBLIC "-//freedesktop//DTD D-Bus Bus Configuration 1.0//EN"
         "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
        <busconfig>
          <type>system</type>
          <listen>unix:path=/tmp/bus2.sock</listen>
          <policy context="default">
            <allow user="*"/>
            <allow own="*"/>
            <allow send_type="method_call"/>
            <allow send_type="signal"/>
            <allow send_type="method_return"/>
            <allow send_type="error"/>
            <allow receive_type="*"/>
          </policy>
        </busconfig>
        EOF
        sudo rm -f /tmp/bus2.sock
        sudo dbus-daemon --config-file=/tmp/bus2.conf --fork
        sudo sh -c "DBUS_SYSTEM_BUS_ADDRESS=unix:path=/tmp/bus2.sock \
          nohup /usr/libexec/bluetooth/bluetoothd -n > '$GITHUB_WORKSPACE/bluetoothd2.log' 2>&1 &"
        sleep 5
        # Both daemons see both adapters; what matters is that the second one could register them.
        if grep -q "Unable to register new adapter" "$GITHUB_WORKSPACE/bluetoothd2.log"; then
          echo "the second bluetoothd could not claim the adapters"
          tail -20 "$GITHUB_WORKSPACE/bluetoothd2.log"
          exit 1
        fi
        # An agent per daemon, and each must outlive the pairing: BlueZ answers a pending
        # confirmation negatively as soon as the registering process exits, which surfaces as
        # org.bluez.Error.AuthenticationFailed. NoInputNoOutput selects "just works" pairing.
        sudo sh -c "nohup bt-agent --capability=NoInputNoOutput > '$GITHUB_WORKSPACE/bt-agent.log' 2>&1 &"
        sudo sh -c "DBUS_SYSTEM_BUS_ADDRESS=unix:path=/tmp/bus2.sock \
          nohup bt-agent --capability=NoInputNoOutput > '$GITHUB_WORKSPACE/bt-agent2.log' 2>&1 &"
        sleep 2

    - name: Pair the two controllers
      shell: bash
      run: |
        # IceBT uses secure RFCOMM, which only works between bonded devices.
        printf 'select %s\npower on\ndiscoverable on\npairable on\nquit\n' "$BT_ADDR" | sudo bluetoothctl
        printf 'select %s\npower on\nquit\n' "$BT_CLIENT_ADDR" | sudo bluetoothctl
        sudo bluetoothctl --timeout 20 scan on < /dev/null
        sudo bluetoothctl --timeout 30 pair "$BT_ADDR" < /dev/null
        sudo bluetoothctl trust "$BT_ADDR" < /dev/null
        # Assert on the stored link key rather than `bluetoothctl info`: the bond is what the tests
        # need, and the device object can be pruned while the key on disk remains valid.
        key="/var/lib/bluetooth/$BT_CLIENT_ADDR/$BT_ADDR/info"
        sudo grep -q "\[LinkKey\]" "$key" 2>/dev/null || {
          echo "no link key at $key -- $BT_CLIENT_ADDR did not bond with $BT_ADDR"
          sudo find /var/lib/bluetooth -name info 2>/dev/null
          cat "$GITHUB_WORKSPACE/bt-agent.log" "$GITHUB_WORKSPACE/bt-agent2.log" 2>/dev/null
          exit 1; }
        echo "bonded: $BT_CLIENT_ADDR <-> $BT_ADDR"

    - name: Start the server-side process controller
      shell: bash
      working-directory: ${{ inputs.working_directory }}
      run: |
        # Runs against the system bus, so the servers it spawns register their RFCOMM profile
        # there. --host-bt is load-bearing here and inert on allTests: it becomes the server's
        # Ice.Default.Host, and startServerSide hands the same value back to the client.
        nohup python3 ../scripts/Controller.py --id=server --host-bt="$BT_ADDR" \
          > "$GITHUB_WORKSPACE/controller.log" 2>&1 &
        sleep 10
        kill -0 $! 2>/dev/null || {
          echo "server controller exited early"; cat "$GITHUB_WORKSPACE/controller.log"; exit 1; }

    - name: Point later steps at the second bluetoothd
      shell: bash
      run: |
        # Exported only now, after the controller has started: the controller and its servers must
        # stay on the system bus, while everything after this -- the test client -- uses the second
        # daemon. That split is what keeps the two sides from registering the same UUID twice.
        echo "DBUS_SYSTEM_BUS_ADDRESS=unix:path=/tmp/bus2.sock" >> "$GITHUB_ENV"
