# Runs real Ice test suites between two Android emulators over emulated Bluetooth. GitHub-hosted
# Linux runners cannot host a Bluetooth stack, but the Android emulator ships a userspace virtual
# Bluetooth controller (Netsim/Rootcanal) that does RFCOMM between emulators.
#
# One emulator ($SERVER) runs the IceBT test server (driven by a Controller.py process controller);
# the other ($CLIENT) runs the client (driven by allTests.py). Both are prepared and bonded through
# the harness itself (Controller.py --bt-setup / --bt-bond), then the suites run over --protocol=bt.
name: Android IceBT over Bluetooth

on:
  workflow_dispatch:
  schedule:
    # ~25 min per run, so it stays off the per-PR critical path: nightly, plus PRs touching IceBT.
    - cron: "0 5 * * *"
  pull_request:
    paths:
      - "cpp/src/IceBT/**"
      - "cpp/test/IceBT/**"
      - "java/src/com.zeroc.icebt/**"
      - "java/test/android/**"
      - "scripts/Util.py"
      - "scripts/Controller.py"
      - "scripts/allTests.py"
      - ".github/workflows/bt-android-harness.yml"

permissions:
  contents: read

env:
  IMG: "system-images;android-36;google_apis;x86_64"
  UUID: "8ce255c0-200a-11e0-ac64-0800200c9a66"
  ANDROID_AVD_HOME: "/home/runner/.android/avd"
  CLIENT: emulator-5554 # runs the IceBT client (allTests.py)
  SERVER: emulator-5556 # runs the IceBT server (Controller.py)
  # Suites proven to pass over emulated RFCOMM (marshalling/RPC core; no transport-specific endpoint
  # strings). Space-separated so each is passed to allTests.py as a separate suite argument.
  TEST: "Ice/operations Ice/ami Ice/enums Ice/inheritance Ice/objects Ice/optional"

jobs:
  android-bt:
    name: Android<->Android IceBT over emulated Bluetooth
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup C++
        uses: ./.github/actions/setup-cpp

      - name: Setup Java
        uses: ./.github/actions/setup-java

      - name: Setup Python
        uses: ./.github/actions/setup-python

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/go* /opt/hostedtoolcache/go /usr/local/.ghcup /usr/share/dotnet
          df -h /

      - name: Build Ice C++ (slice compilers and runtime)
        run: make -C cpp srcs

      - name: Build Python Ice (the harness is a Python Ice program)
        run: make -C python

      - name: Build Ice/IceBT/test Java libraries
        run: |
          make -C java srcs
          make -C java tests
          ls -l java/lib/ice-*.jar java/lib/icebt-*.jar java/lib/test.jar

      - name: Install Android SDK packages
        run: |
          SDKMGR="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMGR" --licenses >/dev/null 2>&1 || true
          "$SDKMGR" "platform-tools" "emulator" "platforms;android-36" "build-tools;36.0.0" "$IMG"
          for d in cmdline-tools/latest/bin platform-tools emulator; do echo "$ANDROID_SDK_ROOT/$d" >> "$GITHUB_PATH"; done

      - name: Build the controller and btecho APKs
        run: |
          # The controller app uses AGP's default debug signing (~/.android/debug.keystore); btecho
          # needs an explicit keystore next to its build file (default signing can't find one here).
          gen() { keytool -genkeypair -v -storepass android -keypass android -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -keystore "$1"; }
          mkdir -p ~/.android
          [ -f ~/.android/debug.keystore ] || gen ~/.android/debug.keystore
          gen java/test/android/btecho/debug.keystore
          (cd java/test/android/controller && ./gradlew --no-daemon assembleDebug)
          (cd java/test/android/btecho && ./gradlew --no-daemon assembleDebug)
          echo "BTECHO_APK=$(find java/test/android/btecho/build/outputs/apk -name '*.apk' | head -1)" >> "$GITHUB_ENV"

      - name: Install Python test deps
        run: python3 -m pip install passlib cryptography numpy

      - name: Create and boot two emulators on Netsim Bluetooth
        run: |
          mkdir -p "$ANDROID_AVD_HOME"
          for n in bt_a bt_b; do echo no | avdmanager -v create avd -k "$IMG" -d "Nexus 6" -n "$n"; done
          # -writable-system lets us install btecho as a privileged system app; -packet-streamer-endpoint
          # attaches both emulators to the shared Netsim virtual Bluetooth network. bt_a is the client
          # (port 5554 -> $CLIENT), bt_b is the server (port 5556 -> $SERVER).
          FLAGS="-no-audio -partition-size 2048 -no-snapshot -writable-system -gpu swiftshader_indirect -accel on -no-boot-anim -no-window -packet-streamer-endpoint default"
          nohup emulator -avd bt_a -port 5554 $FLAGS > emu_client.log 2>&1 &
          nohup emulator -avd bt_b -port 5556 $FLAGS > emu_server.log 2>&1 &
          echo launched

      - name: Prepare and bond the two emulators over Bluetooth
        run: |
          export PYTHONPATH="$GITHUB_WORKSPACE/python/python"
          # Start the adb server up front so the two parallel setups below don't race to start it
          # (which surfaces as "adb: failed to start daemon" and a failed root/remount).
          adb start-server
          # --bt-setup waits for boot, installs btecho as a privileged system app, enables Bluetooth,
          # grants its permissions, and prints BT_ADDRESS. The adb work lives in AndroidProcessController
          # (scripts/Util.py). Prepare both emulators in parallel.
          python3 scripts/Controller.py --android --device="$CLIENT" --bt-setup="$BTECHO_APK" > setup_client.log 2>&1 & client=$!
          python3 scripts/Controller.py --android --device="$SERVER" --bt-setup="$BTECHO_APK" > setup_server.log 2>&1 & server=$!
          rc=0; wait "$client" || rc=$?; wait "$server" || rc=$?
          cat setup_client.log setup_server.log
          [ "$rc" = 0 ] || { echo "bt-setup failed (rc=$rc)"; exit 1; }
          BT_ADDR=$(grep -oE 'BT_ADDRESS=[0-9A-Fa-f:]+' setup_server.log | tail -1 | cut -d= -f2)
          [ -n "$BT_ADDR" ] || { echo "no server Bluetooth address"; exit 1; }
          echo "server ($SERVER) Bluetooth address = $BT_ADDR"
          echo "BT_ADDR=$BT_ADDR" >> "$GITHUB_ENV"
          # Bond the client to the server over secure RFCOMM (required by IceBT).
          python3 scripts/Controller.py --android --device="$CLIENT" --bt-bond="$SERVER" --uuid="$UUID"

      - name: Run the harness over Bluetooth
        run: |
          cd java
          # Start the server-side process controller on $SERVER (it spawns the IceBT test server).
          # --controller-app installs and starts the on-device controller app up front.
          nohup python3 ../scripts/Controller.py --id=server --android --controller-app \
            --device="$SERVER" --host-bt="$BT_ADDR" > "$GITHUB_WORKSPACE/controller.log" 2>&1 & server=$!
          sleep 10
          kill -0 "$server" 2>/dev/null || { echo "server controller exited early"; cat "$GITHUB_WORKSPACE/controller.log"; exit 1; }
          # Run the client suites on $CLIENT. $TEST is unquoted so each suite is a separate argument.
          rc=0
          python3 allTests.py --server=server --protocol=bt --cross=java --android --controller-app \
            --device="$CLIENT" --host-bt="$BT_ADDR" --workers=1 $TEST 2>&1 \
            | tee "$GITHUB_WORKSPACE/alltests.log" || rc=${PIPESTATUS[0]}
          tail -40 "$GITHUB_WORKSPACE/controller.log" || true
          # Pass only if allTests exited 0 and printed a clean "<n> succeeded" summary (a failure
          # summary reads "<x> succeeded and <y> failed:", which won't match the anchored regex).
          grep -qE "^[0-9]+ succeeded$" "$GITHUB_WORKSPACE/alltests.log" && [ "$rc" = 0 ]

      - name: Diagnostics
        if: always()
        timeout-minutes: 5
        run: |
          set +e
          echo "=== emu_client.log ==="; tail -20 emu_client.log 2>/dev/null
          echo "=== emu_server.log ==="; tail -20 emu_server.log 2>/dev/null
          export PYTHONPATH="$GITHUB_WORKSPACE/python/python"
          for d in "$CLIENT" "$SERVER"; do
            echo "==================== $d ===================="
            timeout 60 python3 scripts/Controller.py --android --device="$d" --bt-diagnostics
          done
