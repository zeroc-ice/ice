name: CI Linux

on:
  workflow_dispatch:
  push:
    branches: ["3.7"]
  pull_request:
    branches: ["3.7"]

concurrency:
  group: ci-linux-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: ${{ matrix.config }} on ${{ matrix.distribution }}-${{ matrix.arch }}
    runs-on: ${{ (contains(matrix.arch, 'arm64') || contains(matrix.arch, 'aarch64')) && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # RPM-based distributions (el9, el10, amzn2023)
          - distribution: el9
            arch: x86_64
            config: shared
            image_type: rpm
          - distribution: el9
            arch: x86_64
            config: cpp11-shared
            image_type: rpm
          - distribution: el9
            arch: aarch64
            config: shared
            image_type: rpm
          - distribution: el9
            arch: aarch64
            config: cpp11-shared
            image_type: rpm

          - distribution: el10
            arch: x86_64
            config: shared
            image_type: rpm
          - distribution: el10
            arch: x86_64
            config: cpp11-shared
            image_type: rpm
          - distribution: el10
            arch: aarch64
            config: shared
            image_type: rpm
          - distribution: el10
            arch: aarch64
            config: cpp11-shared
            image_type: rpm

          - distribution: amzn2023
            arch: x86_64
            config: shared
            image_type: rpm
          - distribution: amzn2023
            arch: x86_64
            config: cpp11-shared
            image_type: rpm
          - distribution: amzn2023
            arch: aarch64
            config: shared
            image_type: rpm
          - distribution: amzn2023
            arch: aarch64
            config: cpp11-shared
            image_type: rpm

          # DEB-based distributions (ubuntu, debian)
          - distribution: ubuntu22.04
            arch: amd64
            config: shared
            image_type: deb
          - distribution: ubuntu22.04
            arch: amd64
            config: cpp11-shared
            image_type: deb
          - distribution: ubuntu22.04
            arch: arm64
            config: shared
            image_type: deb
          - distribution: ubuntu22.04
            arch: arm64
            config: cpp11-shared
            image_type: deb

          - distribution: ubuntu24.04
            arch: amd64
            config: shared
            image_type: deb
          - distribution: ubuntu24.04
            arch: amd64
            config: cpp11-shared
            image_type: deb
          - distribution: ubuntu24.04
            arch: arm64
            config: shared
            image_type: deb
          - distribution: ubuntu24.04
            arch: arm64
            config: cpp11-shared
            image_type: deb

          - distribution: debian12
            arch: amd64
            config: shared
            image_type: deb
          - distribution: debian12
            arch: amd64
            config: cpp11-shared
            image_type: deb
          - distribution: debian12
            arch: arm64
            config: shared
            image_type: deb
          - distribution: debian12
            arch: arm64
            config: cpp11-shared
            image_type: deb

          - distribution: debian13
            arch: amd64
            config: shared
            image_type: deb
          - distribution: debian13
            arch: amd64
            config: cpp11-shared
            image_type: deb
          - distribution: debian13
            arch: arm64
            config: shared
            image_type: deb
          - distribution: debian13
            arch: arm64
            config: cpp11-shared
            image_type: deb

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Load version info
        run: |
          source config/version.env
          echo "CHANNEL=$CHANNEL" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: zeroc-ice
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and test C++ (${{ matrix.config }})
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/ice" \
            -w /ice/cpp \
            ghcr.io/zeroc-ice/ice-${{ matrix.image_type }}-builder-${{ matrix.distribution }}:${CHANNEL} \
            bash -c "
              set -ex
              make CONFIGS=${{ matrix.config }} -j\$(nproc) srcs
              make CONFIGS=${{ matrix.config }} -j\$(nproc) tests

              # The --rfilter option excludes tests matching the regex. These tests are excluded because
              # they require dependencies or permissions not available in the Docker builder images:
              # - IceUtil/priority, Ice/threadPoolPriority: require CAP_SYS_NICE for thread priorities
              # - Glacier2/*: require the passlib Python module
              # - IceSSL/configuration: requires the openssl CLI tool
              python3 allTests.py --config=${{ matrix.config }} --workers=4 --debug --continue \
                --rfilter='IceUtil/priority|Ice/threadPoolPriority|Glacier2/|IceSSL/configuration'
            "

      - name: Upload test logs
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-logs-${{ matrix.config }}-${{ matrix.distribution }}-${{ matrix.arch }}
          path: cpp/**/*.log
          if-no-files-found: ignore
        if: always()
