version: 2
updates:
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/actions/*"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/js"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      js-minor-and-patch:
        update-types: ["minor", "patch"]
      js-major:
        update-types: ["major"]

  - package-ecosystem: "pip"
    directory: "/python"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      python-minor-and-patch:
        update-types: ["minor", "patch"]
      python-major:
        update-types: ["major"]

  - package-ecosystem: "pip"
    directory: "/python/docs"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      python-docs:
        patterns: ["*"]

  - package-ecosystem: "swift"
    directory: "/"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    groups:
      swift-minor-and-patch:
        update-types: ["minor", "patch"]
      swift-major:
        update-types: ["major"]

  # The blocks below mirror the ones above with target-branch: "3.8". 3.8 is a
  # stable release branch, so major version updates are ignored there. Dependabot
  # reads this config from the default branch only, and security updates always
  # target the default branch (they cannot be pointed at 3.8).
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/.github/actions/*"
    target-branch: "3.8"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/js"
    target-branch: "3.8"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      js-minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/python"
    target-branch: "3.8"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      python-minor-and-patch:
        update-types: ["minor", "patch"]

  - package-ecosystem: "pip"
    directory: "/python/docs"
    target-branch: "3.8"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      python-docs:
        patterns: ["*"]

  - package-ecosystem: "swift"
    directory: "/"
    target-branch: "3.8"
    schedule:
      interval: monthly
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      swift-minor-and-patch:
        update-types: ["minor", "patch"]
