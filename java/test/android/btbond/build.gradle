// btbond is a tiny standalone Android app used only by the Bluetooth CI harness to force a BR/EDR
// bond between the two emulators before the IceBT tests run (IceBT uses secure RFCOMM, which
// requires bonding). It has no Ice dependencies -- it drives android.bluetooth directly. It is
// installed as a privileged system app so it can auto-confirm pairing.
plugins {
    id 'com.android.application' version '8.13.2'
}

android {
    namespace = 'com.zeroc.btbond'
    compileSdk = 36

    defaultConfig {
        applicationId = 'com.zeroc.btbond'
        minSdk = 34
        targetSdk = 36
        versionCode = 1
        versionName = '1.0'
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    // Sign with an explicit debug keystore generated by the CI workflow. AGP's default debug
    // signing does not reliably locate a keystore in the CI environment (the Setup Java action
    // relocates the home dir), so we point at a keystore next to this build file instead.
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            minifyEnabled = false
        }
    }
}
