// btbond is a tiny standalone Android app used only by the Bluetooth CI harness to force a BR/EDR
// bond between the two emulators before the IceBT tests run (IceBT uses secure RFCOMM, which
// requires bonding). It has no Ice dependencies -- it drives android.bluetooth directly. It is
// installed as a privileged system app so it can auto-confirm pairing.
plugins {
    id 'com.android.application' version '8.13.2'
    id 'checkstyle'
    id 'org.openrewrite.rewrite' version '7.19.0'
}

apply plugin: 'checkstyle'

def runningInCi = providers.environmentVariable("CI").isPresent()

android {
    namespace = 'com.zeroc.btbond'
    compileSdk = 36

    defaultConfig {
        applicationId = 'com.zeroc.btbond'
        minSdk = 34
        targetSdk = 36
        versionCode = 1
        versionName = '1.0'
    }

    compileOptions {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }

    // This app is installed into /system/priv-app with a privapp-permissions allowlist, which lint
    // cannot see: it reports every Bluetooth call as MissingPermission and BLUETOOTH_PRIVILEGED as
    // ProtectedPermissions ("only granted to system apps") -- which is exactly what this app is.
    // Both are by design, and without this `gradlew build` fails on the module.
    lint {
        disable 'MissingPermission', 'ProtectedPermissions'
    }

    // Sign with an explicit debug keystore generated by the CI workflow. AGP's default debug
    // signing does not reliably locate a keystore in the CI environment (the Setup Java action
    // relocates the home dir), so we point at a keystore next to this build file instead.
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            minifyEnabled = false
        }
    }
}

// As in the controller app: this is an 'android' project rather than a 'java' one, so Checkstyle
// doesn't generate a task for us and we declare our own.
task checkstyle(type: Checkstyle) {
    source 'src'
    include '**/*.java'

    // 'classpath' doesn't matter here, but we're required to provide a value for it.
    classpath = files()
}

tasks.named('checkstyle').configure {
    // Ensure that running checkstyle multiple times always yields the same output. Otherwise, after
    // an initial run, the task is marked "UP TO DATE" and subsequent runs skip over it.
    outputs.upToDateWhen { false }
    doNotTrackState("Always run Checkstyle")
}

checkstyle {
    toolVersion = '10.21.4'
    ignoreFailures = false
    showViolations = true

    configDirectory = file("${rootProject.projectDir}/../../../config/checkstyle")

    // In CI, fail the build on any warning.
    if (runningInCi) {
        maxWarnings = 0
    }
}

rewrite {
    configFile = "${rootProject.projectDir}/../../../rewrite.yml"

    activeRecipe('com.zeroc.IceRewriteRecipes')
    activeStyle('com.zeroc.IceRewriteStyle')

    throwOnParseFailures = true
    exportDatatables = true

    exclusion(
        // OpenRewrite can technically modify Groovy and Kotlin files, but we are avoiding this for now.
        '**/*.gradle',
        '**/*.kts',
    )
}
