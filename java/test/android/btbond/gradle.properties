# btbond has no Ice or AndroidX dependency and no Slice to compile, so none of the controller app's
# iceVersion / cppPlatform / cppConfiguration / useAndroidX properties apply here.

# Gradle build properties. The daemon is wanted for local builds, where it makes repeated runs much
# faster; CI passes --no-daemon on the command line, which wins, so nothing is left running there.
org.gradle.daemon = true
org.gradle.configureondemand = false
